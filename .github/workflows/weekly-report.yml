name: 주간 리포트 이메일 발송

on:
  schedule:
    # 매주 월요일 07:30 KST = 일요일 22:30 UTC.
    # 일별 데이터 갱신(07:00 KST)이 끝난 뒤 최신 데이터로 발송되도록 30분 여유를 둔다.
    - cron: "30 22 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 파이썬 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 리포트 생성 및 발송
        id: report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
        run: python scripts/generate_weekly_report.py

      # 이 스텝은 continue-on-error 없이 둔다. 메일 발송이 실패하면 워크플로 자체가
      # 실패로 표시되어야 놓치지 않는다. 아카이브 커밋만 always()로 별도 실행해,
      # 발송 실패와 무관하게 이번 주 스냅샷은 저장한다.
      - name: 아카이브 변경사항 커밋 & 푸시
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weekly_reports.json data/weekly_reports/*.html
          if git diff --cached --quiet; then
            echo "변경된 아카이브가 없습니다."
          else
            git commit -m "chore: 푸드트렌드 위클리 아카이브 추가 ($(date -u +%Y-%m-%d))"
            git push
          fi
