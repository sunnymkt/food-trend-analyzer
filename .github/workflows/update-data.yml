name: 일별 데이터 갱신

on:
  schedule:
    # 매일 22:00 UTC = 07:00 KST
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 파이썬 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: Playwright 크로미움 설치
        run: playwright install --with-deps chromium

      - name: 네이버 데이터랩 검색 추이 수집
        id: naver
        continue-on-error: true
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/fetch_naver_trends.py

      - name: 마켓컬리 신제품 수집
        id: kurly
        continue-on-error: true
        run: python scripts/crawl_kurly_products.py

      - name: 식품 신제품 뉴스 수집
        id: news
        continue-on-error: true
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/fetch_food_news.py

      - name: 지정 키워드 검색 추이 수집
        id: custom-keywords
        continue-on-error: true
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/fetch_custom_keyword_trends.py

      - name: 지정 키워드 관련 인기검색어 수집
        id: related-keywords
        continue-on-error: true
        env:
          NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
        run: python scripts/fetch_related_keywords.py

      - name: 수집 결과 확인
        if: steps.naver.outcome == 'failure' && steps.kurly.outcome == 'failure' && steps.news.outcome == 'failure' && steps.custom-keywords.outcome == 'failure' && steps.related-keywords.outcome == 'failure'
        run: |
          echo "::error::모든 데이터 수집 스텝이 실패했습니다. data/*.json 은 이전 값을 유지합니다."
          exit 1

      - name: 변경사항 커밋 & 푸시
        if: always() && (steps.naver.outcome == 'success' || steps.kurly.outcome == 'success' || steps.news.outcome == 'success' || steps.custom-keywords.outcome == 'success' || steps.related-keywords.outcome == 'success')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git commit -m "chore: 일별 데이터 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
          fi
